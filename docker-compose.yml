services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: english-spanish-translator-api
    environment:
      MODEL_RELEASE_TAG: eng-sp-tranlate
      TRANSLATOR_AUTO_DOWNLOAD_MODEL: "1"
      TRANSLATOR_HOST: 0.0.0.0
      TRANSLATOR_PORT: "8000"
      WANDB_MODE: offline
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
